services:
  backend:
    build: ./backend
    volumes:
      - ./data:/data
    environment:
      DATABASE_URL: sqlite:////data/dental_erp.db
      SECRET_KEY: ${SECRET_KEY:-changeme-please-set-in-env}
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      CORS_ORIGINS: '["http://localhost:5173","http://localhost","http://localhost:80"]'
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-1108}:80"
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
